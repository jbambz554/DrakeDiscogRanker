<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --deep:#060d18;
  --ice1:#d6eeff;
  --ice2:#8ecfff;
  --ice3:#4aa8f0;
  --ice4:#1a6bbf;
  --muted:#5a8fb0;
  --txt:#daeeff;
  --border:rgba(80,160,220,0.16);
  --border-h:rgba(100,190,255,0.35);
}

html{scroll-behavior:smooth;}

body{
  min-height:100vh;
  background:var(--deep);
  font-family:'DM Sans',sans-serif;
  color:var(--txt);
  overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%,rgba(30,100,200,0.1) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 10% 60%,rgba(20,80,160,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 80%,rgba(10,60,140,0.06) 0%,transparent 60%);
}

/* ── HEADER ── */
.header{
  position:relative;overflow:hidden;
  background:linear-gradient(180deg,#08111f 0%,#060d18 100%);
  border-bottom:1px solid var(--border);
  padding:32px 24px 24px;
  text-align:center;
  z-index:1;
}

/* ice crystals */
.crystals{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.crystal{
  position:absolute;animation:cdrift linear infinite;
  opacity:0;user-select:none;
}
@keyframes cdrift{
  0%{transform:translateY(-20px) rotate(0deg) scale(0.6);opacity:0;}
  8%{opacity:1;}88%{opacity:0.3;}
  100%{transform:translateY(210px) rotate(380deg) scale(1.1);opacity:0;}
}

/* ICEMAN logo — usesdisplay:block;
  margin:0 auto 20px;
  z-index:2;
}
.iceman-logo-img{
  width:min(420px,75vw);
  height:auto;
  display:block;
  margin:0 auto;
  filter:drop-shadow(0 0 28px rgba(100,200,255,0.55))
         drop-shadow(0 0 55px rgba(60,150,230,0.28))
         drop-shadow(0 0 10px rgba(180,230,255,0.35));
}

.iceman-tagline{
  font-family:'Poppins',sans-serif;
  font-weight:600;
  font-size:18px;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:var(--ice2);
  text-align:center;
  margin:-4px 0 22px;
  position:relative;z-index:2;
  text-shadow:0 0 18px rgba(100,200,255,0.35);
}

/* badge */
.iceman-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(80,160,255,0.08);border:1px solid rgba(100,200,255,0.25);
  border-radius:100px;padding:5px 16px;font-size:12px;color:var(--ice2);font-weight:500;
  margin-bottom:18px;letter-spacing:0.5px;z-index:1;position:relative;
}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--ice2);flex-shrink:0;animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.25;transform:scale(0.65);}}

/* countdown */
.countdown-bar{
  display:inline-flex;align-items:center;gap:18px;
  background:rgba(6,18,40,0.75);border:1px solid rgba(80,180,255,0.22);
  border-radius:100px;padding:9px 24px;z-index:1;position:relative;
  backdrop-filter:blur(8px);
}
.cdu{text-align:center;}
.cdn{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff;line-height:1;display:block;text-shadow:0 0 14px rgba(100,200,255,0.7);}
.cdl{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
.cdsep{color:var(--ice2);font-size:22px;opacity:0.4;margin-top:-7px;}

/* progress */
.prog-wrap{height:2px;background:rgba(255,255,255,0.05);border-radius:2px;margin:14px auto 0;max-width:400px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--ice4),var(--ice2));border-radius:2px;transition:width 0.5s ease;width:0%;}
.prog-label{font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:0.3px;}

/* ── TABS ── */
.tabs{
  display:flex;border-bottom:1px solid var(--border);
  background:rgba(6,12,24,0.96);position:sticky;top:0;z-index:100;
  backdrop-filter:blur(10px);
}
.tab{
  flex:1;padding:13px;font-size:13px;font-weight:500;text-align:center;
  cursor:pointer;color:var(--muted);border:none;border-bottom:2px solid transparent;
  background:none;font-family:'DM Sans',sans-serif;transition:color 0.2s,border-color 0.2s;
}
.tab.active{color:var(--ice1);border-bottom-color:var(--ice3);}
.tab:hover:not(.active){color:var(--ice2);}

/* ── PANELS ── */
.panel{display:none;padding:24px;max-width:1100px;margin:0 auto;}
.panel.active{display:block;}

/* ── STATS ── */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px;}
.stat-card{background:rgba(13,32,56,0.7);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--ice2);line-height:1;margin-bottom:3px;text-shadow:0 0 14px rgba(80,180,255,0.4);}
#s-top{min-height:42px;display:flex;align-items:center;justify-content:center;text-shadow:none;}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}

/* ── ALBUM GRID — exactly 4 columns ── */
.album-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

.album-card{
  background:rgba(10,24,44,0.85);border:1px solid var(--border);
  border-radius:12px;padding:12px;transition:border-color 0.25s,box-shadow 0.25s,transform 0.2s;
}
.album-card:hover{transform:translateY(-2px);border-color:rgba(80,160,220,0.3);}
.album-card.rated{border-color:rgba(80,190,255,0.38);box-shadow:0 0 16px rgba(60,150,255,0.12);}

.cover-wrap{width:100%;aspect-ratio:1;border-radius:8px;margin-bottom:10px;overflow:hidden;background:#071525;position:relative;}
.cover-wrap img{width:100%;height:100%;object-fit:cover;display:block;border-radius:8px;transition:transform 0.3s;}
.album-card:hover .cover-wrap img{transform:scale(1.04);}
.cover-fallback{
  display:none;width:100%;height:100%;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--muted);
  text-align:center;padding:10px;line-height:1.4;letter-spacing:1px;gap:5px;
}
.fb-year{font-size:10px;color:rgba(80,160,200,0.4);}

.album-title{font-size:12px;font-weight:500;color:var(--txt);margin-bottom:2px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.album-meta{font-size:10px;color:var(--muted);margin-bottom:10px;}
.album-type{color:rgba(80,160,200,0.45);font-size:9px;}

.rating-row{display:flex;align-items:center;gap:7px;}
.rating-input{
  width:56px;background:rgba(80,160,255,0.07);border:1px solid rgba(80,190,255,0.2);
  border-radius:6px;color:var(--ice1);font-size:15px;font-weight:500;padding:5px 7px;
  font-family:'Bebas Neue',sans-serif;letter-spacing:1px;-moz-appearance:textfield;
}
.rating-input::-webkit-outer-spin-button,.rating-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.rating-input:focus{outline:none;border-color:var(--ice3);box-shadow:0 0 0 3px rgba(70,160,240,0.14);}
.rating-badge{font-size:10px;color:var(--muted);}
.rated-dot{width:6px;height:6px;border-radius:50%;background:var(--ice3);margin-left:auto;display:none;box-shadow:0 0 8px rgba(70,180,255,0.7);}
.album-card.rated .rated-dot{display:block;}

/* ── TIER LIST ── */
.tier-view{display:flex;flex-direction:column;gap:8px;}
.tier-row{display:flex;align-items:stretch;min-height:68px;border-radius:10px;overflow:hidden;border:1px solid rgba(80,160,200,0.1);}
.tier-label{width:68px;min-width:68px;flex-shrink:0;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.tier-label-letter{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;}
.tier-label-range{font-size:8px;opacity:0.6;letter-spacing:0;font-family:'DM Sans',sans-serif;margin-top:2px;}
.tier-albums{flex:1;display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;align-items:center;background:rgba(8,20,40,0.9);}
.tier-chip{
  background:rgba(16,42,80,0.9);border:1px solid rgba(80,160,200,0.15);
  border-radius:7px;padding:5px 10px;font-size:11px;font-weight:500;
  display:flex;align-items:center;gap:7px;color:var(--txt);
}
.tier-chip img{width:26px;height:26px;border-radius:4px;object-fit:cover;flex-shrink:0;}
.tier-chip-score{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--ice2);}
.tier-empty{font-size:12px;color:#1e3a5a;padding:4px 8px;}

.unrated-section{margin-top:20px;padding-top:14px;border-top:1px solid rgba(80,160,200,0.07);}
.unrated-label{font-size:10px;color:#1e3a5a;margin-bottom:8px;letter-spacing:2px;text-transform:uppercase;}
.unrated-chips{display:flex;flex-wrap:wrap;gap:6px;}
.unrated-chip{background:rgba(10,24,44,0.5);border:1px solid rgba(80,160,200,0.07);border-radius:6px;padding:3px 10px;font-size:11px;color:#2a5080;}

/* ── BUTTONS ── */
.cta-row{display:flex;gap:10px;margin-top:26px;justify-content:center;flex-wrap:wrap;}
.btn{
  background:linear-gradient(135deg,var(--ice4),var(--ice3));color:#fff;border:none;
  border-radius:9px;padding:11px 24px;font-size:13px;font-weight:500;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:opacity 0.15s,transform 0.1s;
  box-shadow:0 0 18px rgba(26,100,200,0.3);
}
.btn:hover{opacity:0.85;}
.btn:active{transform:scale(0.97);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid rgba(80,160,200,0.2);box-shadow:none;}
.btn-ghost:hover{color:var(--txt);border-color:var(--border-h);opacity:1;}

/* ── SNAPSHOT SUMMARY ── */
.snapshot{
  background:linear-gradient(135deg,rgba(10,24,52,0.85),rgba(8,16,38,0.85));
  border:1px solid var(--border);
  border-radius:12px;
  padding:18px 20px;
  margin-bottom:16px;
}
.snap-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.snap-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--ice1);}
.snap-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.snap-stat{background:rgba(6,14,28,0.6);border:1px solid rgba(80,160,200,0.08);border-radius:8px;padding:10px;text-align:center;}
.snap-stat-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--ice2);line-height:1;}
.snap-stat-lbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:5px;}
.snap-top-img{width:34px;height:34px;border-radius:5px;object-fit:cover;display:inline-block;vertical-align:middle;box-shadow:0 0 10px rgba(80,180,255,0.4);}
@media(max-width:560px){
  .snap-stats{grid-template-columns:repeat(2,1fr);}
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,var(--ice4),var(--ice3));
  color:#fff;padding:12px 22px;border-radius:9px;font-size:13px;font-weight:500;
  box-shadow:0 6px 24px rgba(0,0,0,0.4),0 0 18px rgba(26,100,200,0.4);
  z-index:1000;opacity:0;pointer-events:none;
  transition:opacity 0.2s,transform 0.2s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* offscreen render container for image capture */
.capture-stage{
  position:fixed;left:-99999px;top:0;width:720px;
  background:#060d18;padding:20px;
  font-family:'DM Sans',sans-serif;color:var(--txt);
}

/* iOS image preview modal (long-press to save to Photos) */
.img-modal{
  position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:2000;
  display:none;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:18px;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.img-modal.show{display:flex;}
.img-modal-hint{
  font-family:'DM Sans',sans-serif;color:#daeeff;font-size:13px;line-height:1.5;
  text-align:center;margin-bottom:14px;max-width:340px;
}
.img-modal-hint b{color:var(--ice2);}
.img-modal img{
  max-width:100%;height:auto;border-radius:10px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  -webkit-touch-callout:default;touch-callout:default;
}
.img-modal-close{
  margin-top:18px;background:linear-gradient(135deg,var(--ice4),var(--ice3));
  color:#fff;border:none;border-radius:9px;padding:11px 28px;
  font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;
}

footer{text-align:center;padding:22px;font-size:10px;color:rgba(80,130,170,0.28);letter-spacing:2px;text-transform:uppercase;position:relative;z-index:1;}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .album-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .panel{padding:16px;}
  .cdn{font-size:22px;}
  .iceman-logo-img{width:min(480px,92vw);}
}
@media(max-width:440px){
  .album-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

    <div class="cdu"><span class="cdn" id="cd-m">--</span><span class="cdl">Min</span></div>
    <span class="cdsep">:</span>

<div class="panel active" id="panel-rate">

      <div class="snap-stat"><div class="snap-stat-val" id="snap-avg">—</div><div class="snap-stat-lbl">Avg Score</div></div>
      <div class="snap-stat"><div class="snap-stat-val" id="snap-top">—</div><div class="snap-stat-lbl">Highest Rated</div></div>

<div class="toast" id="toast"></div>

  <div class="img-modal-hint"><b>Long-press the image</b> below, then tap <b>Save to Photos</b></div>
  <img id="img-modal-img" alt="Your Drake tier list"/>
  <button class="img-modal-close" onclick="closeImgModal()">Done</button>
</div>

<footer>Drake Discography Challenge &nbsp;·&nbsp; ICEMAN 2026</footer>

<script>
const ALBUMS = [
  { id:'sfg',     title:'So Far Gone',              year:2009, type:'EP',       img:'images/sfg.jpg' },
  { id:'tml',     title:'Thank Me Later',            year:2010, type:'Album',   img:'images/tml.jpg' },
  { id:'tc',      title:'Take Care',                 year:2011, type:'Album',   img:'images/tc.jpg' },
  { id:'nwts',    title:'Nothing Was the Same',      year:2013, type:'Album',   img:'images/nwts.jpg' },
  { id:'iyrtitl', title:"If You're Reading This…",  year:2015, type:'Mixtape', img:'images/iyrtitl.jpg' },
  { id:'watba',   title:'What a Time to Be Alive',   year:2015, type:'Collab',  img:'images/watba.jpg' },
  { id:'views',   title:'Views',                     year:2016, type:'Album',   img:'images/views.jpg' },
  { id:'more',    title:'More Life',                 year:2017, type:'Playlist',img:'images/more.jpg' },
  { id:'scorpion',title:'Scorpion',                  year:2018, type:'Album',   img:'images/scorpion.jpg' },
  { id:'cp',      title:'Care Package',              year:2019, type:'Comp.',   img:'images/cp.jpg' },
  { id:'dldt',    title:'Dark Lane Demo Tapes',      year:2020, type:'Mixtape', img:'images/dldt.jpg' },
  { id:'clb',     title:'Certified Lover Boy',       year:2021, type:'Album',   img:'images/clb.jpg' },
  { id:'hn',      title:'Honestly, Nevermind',       year:2022, type:'Album',   img:'images/hn.jpg' },
  { id:'hl',      title:'Her Loss',                  year:2022, type:'Collab',  img:'images/hl.jpg' },
  { id:'fatd',    title:'For All the Dogs',          year:2023, type:'Album',   img:'images/fatd.jpg' },
  { id:'sssu',    title:'Some Sexy Songs 4 U',       year:2025, type:'Collab',  img:'images/sssu.jpg' },
];

// S=9.5-10, A=9.0-9.4, B=8.0-8.9, C=7.0-7.9, D=6.0-6.9, F=5.0-5.9
const TIERS = [
  { label:'S', lo:9.5, hi:10,  range:'9.5 – 10',  bg:'rgba(6,20,8,0.96)',   text:'#6ef09a', border:'rgba(60,220,100,0.35)' },
  { label:'A', lo:9.0, hi:9.4, range:'9.0 – 9.4', bg:'rgba(4,16,36,0.96)',  text:'#5ec8f8', border:'rgba(60,180,255,0.35)' },
  { label:'B', lo:8.0, hi:8.9, range:'8.0 – 8.9', bg:'rgba(10,14,42,0.96)', text:'#96a8ff', border:'rgba(120,140,255,0.28)' },
  { label:'C', lo:7.0, hi:7.9, range:'7.0 – 7.9', bg:'rgba(16,10,36,0.96)', text:'#cc96ff', border:'rgba(180,110,255,0.25)' },
  { label:'D', lo:6.0, hi:6.9, range:'6.0 – 6.9', bg:'rgba(26,12,6,0.96)',  text:'#f0b860', border:'rgba(230,160,50,0.25)' },
  { label:'F', lo:5.0, hi:5.9, range:'5.0 – 5.9', bg:'rgba(30,6,6,0.96)',   text:'#f06060', border:'rgba(230,70,70,0.25)' },
];

let ratings = {};
try { const s=localStorage.getItem('drake_iceman_v5'); if(s) ratings=JSON.parse(s); } catch(e) {}
function save(){ try{localStorage.setItem('drake_iceman_v5',JSON.stringify(ratings));}catch(e){} }

function buildGrid(){
  const grid=document.getElementById('album-grid');
  grid.innerHTML='';
  ALBUMS.forEach(a=>{
    const val=ratings[a.id]??''
    const card=document.createElement('div');
    card.className='album-card'+(val!==''?' rated':'');
    card.id='card-'+a.id;
    card.innerHTML=`
      <div class="cover-wrap">
        <img src="${a.img}" alt="${a.title}" loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"/>
        <div class="cover-fallback"><span>${a.title}</span><span class="fb-year">${a.year}</span></div>
      </div>
      <div class="album-title" title="${a.title}">${a.title}</div>
      <div class="album-meta">${a.year} <span class="album-type">· ${a.type}</span></div>
      <div class="rating-row">
        <input class="rating-input" type="number" min="0" max="10" step="0.1"
          placeholder="—" value="${val}" data-id="${a.id}"/>
        <span class="rating-badge">/ 10</span>
        <div class="rated-dot"></div>
      </div>`;
    grid.appendChild(card);
  });
  grid.querySelectorAll('.rating-input').forEach(inp=>{
    inp.addEventListener('input',function(){
      const id=this.dataset.id;
      let v=parseFloat(this.value);
      if(isNaN(v)){delete ratings[id];}
      else{v=Math.min(10,Math.max(0,Math.round(v*10)/10));ratings[id]=v;}
      save();
      document.getElementById('card-'+id).classList.toggle('rated',ratings[id]!==undefined);
      updateStats();
    });
  });
  updateStats();
}

function updateStats(){
  const scored=ALBUMS.filter(a=>ratings[a.id]!==undefined);
  const count=scored.length,total=ALBUMS.length;
  document.getElementById('s-rated').textContent=count+'/'+total;
  if(count===0){
    document.getElementById('s-avg').textContent='—';
    document.getElementById('s-top').innerHTML='—';
  } else {
    const avg=scored.reduce((s,a)=>s+ratings[a.id],0)/count;
    document.getElementById('s-avg').textContent=avg.toFixed(1);
    const top=[...scored].sort((a,b)=>ratings[b.id]-ratings[a.id])[0];
    document.getElementById('s-top').innerHTML=`<img src="${top.img}" alt="${top.title}" title="${top.title} — ${ratings[top.id].toFixed(1)}" style="width:42px;height:42px;border-radius:6px;object-fit:cover;display:inline-block;vertical-align:middle;box-shadow:0 0 12px rgba(80,180,255,0.45);" onerror="this.outerHTML='${top.title.split(' ').slice(0,2).join(' ')}';"/>`;
  }
  document.getElementById('prog-fill').style.width=(count/total*100).toFixed(1)+'%';
  document.getElementById('prog-label').textContent=count+' of '+total+' albums rated';
}

function buildTier(){
  updateSnapshot();
  const view=document.getElementById('tier-view');
  view.innerHTML='';
  TIERS.forEach(tier=>{
    const albums=ALBUMS
      .filter(a=>{const r=ratings[a.id];return r!==undefined&&r>=tier.lo&&r<=tier.hi;})
      .sort((a,b)=>ratings[b.id]-ratings[a.id]);
    const row=document.createElement('div');
    row.className='tier-row';
    row.innerHTML=`
      <div class="tier-label" style="background:${tier.bg};color:${tier.text};border-right:1px solid ${tier.border};">
        <div class="tier-label-letter">${tier.label}</div>
        <div class="tier-label-range">${tier.range}</div>
      </div>
      <div class="tier-albums">
        ${albums.length===0?'<span class="tier-empty">—</span>':''}
        ${albums.map(a=>`
          <div class="tier-chip">
            <img src="${a.img}" alt="${a.title}" onerror="this.style.display='none'"/>
            ${a.title.length>24?a.title.substring(0,22)+'…':a.title}
            <span class="tier-chip-score">${ratings[a.id].toFixed(1)}</span>
          </div>`).join('')}
      </div>`;
    view.appendChild(row);
  });
  const unrated=ALBUMS.filter(a=>ratings[a.id]===undefined);
  if(unrated.length>0){
    const ur=document.createElement('div');
    ur.className='unrated-section';
    ur.innerHTML=`<div class="unrated-label">Not yet rated</div>
      <div class="unrated-chips">${unrated.map(a=>`<div class="unrated-chip">${a.title}</div>`).join('')}</div>`;
    view.appendChild(ur);
  }
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>
    t.classList.toggle('active',(i===0&&tab==='rate')||(i===1&&tab==='tier')));
  document.getElementById('panel-rate').classList.toggle('active',tab==='rate');
  document.getElementById('panel-tier').classList.toggle('active',tab==='tier');
  if(tab==='tier') buildTier();
}

function clearRatings(){
  if(!confirm('Clear all your ratings?')) return;
  ratings={};save();buildGrid();
}

function updateSnapshot(){
  const scored=ALBUMS.filter(a=>ratings[a.id]!==undefined);
  const count=scored.length,total=ALBUMS.length;
  document.getElementById('snap-rated').textContent=count+'/'+total;
  if(count===0){
    document.getElementById('snap-avg').textContent='—';
    document.getElementById('snap-top').innerHTML='—';
    document.getElementById('snap-elite').innerHTML='—';
  } else {
    const avg=scored.reduce((s,a)=>s+ratings[a.id],0)/count;
    document.getElementById('snap-avg').textContent=avg.toFixed(1);
    const sorted=[...scored].sort((a,b)=>ratings[b.id]-ratings[a.id]);
    const top=sorted[0];
    const bot=sorted[sorted.length-1];
    const imgHtml=(a)=>`<img class="snap-top-img" src="${a.img}" alt="${a.title}" title="${a.title} — ${ratings[a.id].toFixed(1)}" onerror="this.outerHTML='${a.title.split(' ').slice(0,2).join(' ')}';"/>`;
    document.getElementById('snap-top').innerHTML=imgHtml(top);
    document.getElementById('snap-elite').innerHTML=imgHtml(bot);
  }
}

/* ── SHARE: encode/decode ratings in URL ── */
// Compact format: each album = 2 chars in base-36 (00-2s = 0-100, "--" = unrated)
// Order matches ALBUMS array, so we get exactly 32 chars total. Base-36 keeps 10.0 (=100) in 2 chars.
function encodeRatings(){
  return ALBUMS.map(a=>{
    const r=ratings[a.id];
    if(r===undefined) return '--';
    const n=Math.round(r*10); // 0-100
    return n.toString(36).padStart(2,'0');
  }).join('');
}
function decodeRatings(str){
  const out={};
  if(!str || str.length!==ALBUMS.length*2) return null;
  for(let i=0;i<ALBUMS.length;i++){
    const chunk=str.substring(i*2,i*2+2);
    if(chunk==='--') continue;
    if(!/^[0-9a-z]{2}$/i.test(chunk)) return null;
    const n=parseInt(chunk,36);
    if(isNaN(n)||n<0||n>100) return null;
    out[ALBUMS[i].id]=n/10;
  }
  return out;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2400);
}

function shareLink(){
  const scored=ALBUMS.filter(a=>ratings[a.id]!==undefined).length;
  if(scored===0){
    showToast('Rate at least one album first!');
    return;
  }
  const url=location.origin+location.pathname+'?r='+encodeRatings();
  // Try modern clipboard API, fall back to textarea trick
  const fallback=()=>{
    const ta=document.createElement('textarea');
    ta.value=url;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');showToast('Link copied to clipboard!');}
    catch(e){prompt('Copy this link:',url);}
    document.body.removeChild(ta);
  };
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(url)
      .then(()=>showToast('Link copied to clipboard!'))
      .catch(fallback);
  } else { fallback(); }
}

function isMobile(){
  return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
}
function isIOS(){
  // iPhones, iPads (incl. iPadOS reporting as Mac with touch)
  return /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
    (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
}

function downloadImage(){
  const scored=ALBUMS.filter(a=>ratings[a.id]!==undefined).length;
  if(scored===0){
    showToast('Rate at least one album first!');
    return;
  }
  if(typeof html2canvas==='undefined'){
    showToast('Image library still loading — try again');
    return;
  }
  showToast('Generating image…');

  // Build an offscreen clone containing only what we want in the image:
  // the snapshot summary + tier list. Live DOM is never touched.
  const stage=document.createElement('div');
  stage.className='capture-stage';
  const snapshot=document.getElementById('snapshot').cloneNode(true);
  const tierView=document.getElementById('tier-view').cloneNode(true);
  stage.appendChild(snapshot);
  stage.appendChild(tierView);
  document.body.appendChild(stage);

  let finished=false;
  const cleanup=()=>{ if(stage.parentNode) stage.parentNode.removeChild(stage); };
  const fail=(msg)=>{
    if(finished) return;
    finished=true;
    cleanup();
    showToast(msg||'Image capture failed');
  };

  // Hard timeout safety net so the user is never stuck on "Generating image…"
  const safetyTimer=setTimeout(()=>fail('Image capture timed out — try again'),15000);

  // Lower scale on mobile so the resulting image isn't massive (iOS struggles with large data URLs)
  const useScale=isMobile()?1.5:2;

  // Small delay so the clone fully lays out before capture
  setTimeout(()=>{
    html2canvas(stage,{
      backgroundColor:'#060d18',
      scale:useScale,
      logging:false,
      imageTimeout:8000,
    }).then(canvas=>{
      if(finished) return;
      finished=true;
      clearTimeout(safetyTimer);
      cleanup();
      if(isIOS()){
        // iOS Safari ignores the `download` attribute on blob links.
        // Show the rendered image in a modal so the user can long-press → Save to Photos.
        let dataUrl;
        try {
          dataUrl=canvas.toDataURL('image/png');
        } catch(e) {
          // Tainted canvas (cross-origin image without CORS) → toDataURL throws
          console.error('toDataURL failed:',e);
          showToast('Image generation failed — try again');
          return;
        }
        showImgModal(dataUrl);
        return;
      }
      // Android / desktop: blob download
      try {
        canvas.toBlob(blob=>{
          if(!blob){
            showToast('Image generation failed — try again');
            return;
          }
          triggerDownload(blob,'my-drake-tier-list.png');
        },'image/png');
      } catch(e) {
        console.error('toBlob failed:',e);
        showToast('Image generation failed — try again');
      }
    }).catch(err=>{
      console.error('html2canvas error:',err);
      clearTimeout(safetyTimer);
      fail('Image capture failed — try again');
    });
  },120);
}

function triggerDownload(blob,filename){
  const link=document.createElement('a');
  link.href=URL.createObjectURL(blob);
  link.download=filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(()=>URL.revokeObjectURL(link.href),1000);
  showToast('Image downloaded!');
}

function showImgModal(dataUrl){
  document.getElementById('img-modal-img').src=dataUrl;
  document.getElementById('img-modal').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeImgModal(){
  document.getElementById('img-modal').classList.remove('show');
  document.getElementById('img-modal-img').src='';
  document.body.style.overflow='';
}

/* ── On load: check URL for shared ratings ── */
function loadFromUrl(){
  const params=new URLSearchParams(location.search);
  const r=params.get('r');
  if(!r) return false;
  const decoded=decodeRatings(r);
  if(!decoded) return false;
  // Only override local if there's something there
  const hasShared=Object.keys(decoded).length>0;
  if(!hasShared) return false;
  // If they have local ratings, ask before overwriting
  const hasLocal=Object.keys(ratings).length>0;
  if(hasLocal && !confirm('Open this shared tier list? Your current ratings will be replaced (you can refresh the page without ?r= to get them back if they were saved).')) return false;
  ratings=decoded;
  save();
  return true;
}

function updateCountdown(){
  const diff=new Date('2026-05-15T00:00:00')-new Date();
  if(diff<=0){['cd-d','cd-h','cd-m','cd-s'].forEach(id=>document.getElementById(id).textContent='00');return;}
  document.getElementById('cd-d').textContent=String(Math.floor(diff/86400000)).padStart(2,'0');
  document.getElementById('cd-h').textContent=String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
  document.getElementById('cd-m').textContent=String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
  document.getElementById('cd-s').textContent=String(Math.floor((diff%60000)/1000)).padStart(2,'0');
}

function spawnCrystals(){
  const c=document.getElementById('crystals');
  const shapes=['❄','✦','◆','⬡','❆','✧'];
  for(let i=0;i<20;i++){
    const el=document.createElement('div');
    el.className='crystal';
    el.textContent=shapes[Math.floor(Math.random()*shapes.length)];
    el.style.left=Math.random()*100+'%';
    el.style.top=Math.random()*85+'%';
    el.style.animationDelay=(Math.random()*12)+'s';
    el.style.animationDuration=(8+Math.random()*9)+'s';
    el.style.fontSize=(10+Math.random()*14)+'px';
    el.style.color=`rgba(160,220,255,${0.1+Math.random()*0.13})`;
    c.appendChild(el);
  }
}

const _shared=loadFromUrl();
buildGrid();spawnCrystals();updateCountdown();setInterval(updateCountdown,1000);
if(_shared) switchTab('tier');
</script>
